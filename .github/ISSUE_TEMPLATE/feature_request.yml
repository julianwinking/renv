name: Feature request
description: Propose an improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the research workflow pain point, not just the mechanism.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketches of the CLI or MCP surface are welcome. Note that renv has a few load-bearing design rules (see AGENTS.md).
    validations:
      required: true
